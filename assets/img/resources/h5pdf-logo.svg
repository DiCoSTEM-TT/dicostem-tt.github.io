<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 820" role="img" aria-labelledby="title desc">
  <title id="title">H5PDF logo</title>
  <desc id="desc">PDF to H5P conversion logo.</desc>
  <defs>
    <linearGradient id="pdfRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4e3b"/>
      <stop offset="100%" stop-color="#d71920"/>
    </linearGradient>
    <linearGradient id="pdfLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6f8fc"/>
      <stop offset="100%" stop-color="#dde6f2"/>
    </linearGradient>
    <linearGradient id="pdfFold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dce4f1"/>
      <stop offset="100%" stop-color="#b9cae2"/>
    </linearGradient>
    <linearGradient id="h5pBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#318fff"/>
      <stop offset="100%" stop-color="#0f4ec9"/>
    </linearGradient>
    <linearGradient id="arrowMix" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ff4e3b"/>
      <stop offset="55%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#4ab2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#00122b" flood-opacity=".16"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <path d="M98 180h170l74 74v228c0 16-13 29-29 29H98c-16 0-29-13-29-29V209c0-16 13-29 29-29z" fill="url(#pdfLight)"/>
    <path d="M268 180v56c0 16 13 29 29 29h45z" fill="url(#pdfFold)"/>
    <path d="M70 434h272v77H70z" fill="url(#pdfRed)"/>
    <rect x="25" y="234" width="230" height="95" rx="28" fill="url(#pdfRed)"/>
    <text x="140" y="297" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="900" text-anchor="middle" fill="#ffffff">PDF</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M319 362h165v-40l111 90-111 90v-40H319c-17 0-31-14-31-31v-38c0-17 14-31 31-31z" fill="url(#arrowMix)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="529" y="205" width="238" height="218" rx="30" fill="url(#h5pBlue)"/>
    <rect x="529" y="419" width="238" height="32" rx="12" fill="#1544a9"/>
    <ellipse cx="648" cy="245" rx="119" ry="18" fill="#73c4ff" opacity=".55"/>
    <circle cx="650" cy="355" r="58" fill="#49a3ff"/>
    <circle cx="650" cy="355" r="49" fill="#63b2ff"/>
    <polygon points="632,327 682,355 632,383" fill="#ffffff"/>
    <text x="648" y="313" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="900" text-anchor="middle" fill="#ffffff">H5P</text>
  </g>

  <g filter="url(#shadow)">
    <text x="410" y="690" font-family="Arial, Helvetica, sans-serif" font-size="106" font-weight="900" text-anchor="middle">
      <tspan fill="#1459d2">H5P</tspan><tspan fill="#ea2e2a">DF</tspan>
    </text>
  </g>
</svg>
