    <rect x="46" y="154" width="154" height="70" rx="20" fill="url(#pdfRed)"/>
    <text x="123" y="202" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800" text-anchor="middle" fill="#fff">PDF</text>
  </g>

  <g opacity=".92">
