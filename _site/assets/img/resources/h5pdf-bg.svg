<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">H5PDF background</title>
  <desc id="desc">Stylised PDF to H5P graphic used as a decorative background.</desc>
  <defs>
    <linearGradient id="pdfRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5039"/>
      <stop offset="100%" stop-color="#d71920"/>
    </linearGradient>
    <linearGradient id="h5Blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f8cff"/>
      <stop offset="100%" stop-color="#1751c4"/>
    </linearGradient>
    <linearGradient id="arrowMix" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ff5039"/>
      <stop offset="100%" stop-color="#2f8cff"/>
    </linearGradient>
  </defs>

  <g opacity=".95">
    <path d="M95 110h126l60 60v182c0 13-11 24-24 24H95c-13 0-24-11-24-24V134c0-13 11-24 24-24z" fill="#f4f7fb"/>
    <path d="M221 110v47c0 13 11 24 24 24h36z" fill="#dce5f3"/>
